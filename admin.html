<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin · Station Mystère</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="game-shell admin-shell">
      <section class="topbar admin-topbar" aria-label="En-tête admin">
        <div class="title-lockup">
          <p class="kicker">Privé</p>
          <h1>Stats Admin</h1>
          <div class="meta-row">
            <span id="adminGenerated">Chargement</span>
            <span id="adminActive">Parties actives</span>
          </div>
        </div>
        <a class="secondary-button admin-home" href="/">Jeu</a>
      </section>

      <section class="admin-card">
        <div class="stats-head">
          <h2>Jours suivis</h2>
          <span>Serveur actuel</span>
        </div>
        <div id="adminDays" class="admin-days">Chargement des statistiques...</div>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
